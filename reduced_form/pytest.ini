[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    slow: tests that take more than a few seconds (skip with -m "not slow")
    integration: tests that exercise multiple modules together
    requires_data: tests that need the full data/panel_smm_ready.csv loaded

# Verbose output by default
addopts = -v --tb=short --strict-markers

# Suppress common noisy warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning:statsmodels.*
    ignore::FutureWarning:sklearn.*
    ignore::UserWarning
